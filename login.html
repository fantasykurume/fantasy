<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fantasy CMS Login</title>

<link rel="stylesheet" href="assets/css/admin/admin.css">

</head>


<body>


<div class="login-container">


<h1>
Fantasy CMS
</h1>


<p>
管理者ログイン
</p>



<div class="login-box">


<input
id="loginId"
type="text"
placeholder="ID">


<input
id="loginPassword"
type="password"
placeholder="パスワード">



<button id="loginButton">
ログイン
</button>



<p id="loginMessage"></p>


</div>


</div>



<script type="module" src="assets/js/admin/auth.js"></script>


</body>

</html>
